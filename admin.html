<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>
    <script>checkAccess('admin');</script>
    <script src="./js/dashboard.js"></script>
</head>
<body class="bg-gray-50 flex">
    <aside class="w-64 bg-slate-900 h-screen p-6 text-white fixed">
        <h2 class="font-bold text-xl mb-10">Admin Panel</h2>
        <button id="logoutBtn" class="text-red-400 font-bold mt-10">LOGOUT</button>
    </aside>
    <main class="ml-64 p-10 w-full">
        <h1 class="text-3xl font-bold mb-10">Resource Management</h1>
        <form id="uploadForm" class="bg-white p-8 rounded-2xl shadow-sm mb-10 max-w-2xl">
            <input type="text" id="title" placeholder="Title" class="w-full mb-4 p-3 border rounded-xl" required>
            <select id="type" class="w-full mb-4 p-3 border rounded-xl">
                <option value="pdf">PDF</option>
                <option value="image">Image</option>
                <option value="video">Video</option>
            </select>
            <input type="file" id="file" class="mb-6 block" required>
            <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">UPLOAD CONTENT</button>
        </form>
        <div id="postsList" class="grid gap-4 max-w-2xl"></div>
    </main>
</body>
</html>
