<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Hi Tech Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50">
    <nav class="p-6 flex justify-between items-center bg-white shadow">
        <h1 class="text-2xl font-bold">Admin Dashboard</h1>
        <div id="profile" class="flex items-center space-x-4">
            <span id="user-email"></span>
            <button id="logout" class="px-4 py-2 bg-red-600 text-white rounded">Logout</button>
        </div>
    </nav>
    <main class="p-6">
        <form id="upload-form" class="bg-white p-8 rounded shadow-md mb-8">
            <h2 class="text-xl font-bold mb-4">Upload Content</h2>
            <input type="text" id="title" placeholder="Title" class="w-full p-2 mb-4 border rounded" required>
            <input type="file" id="file" class="w-full p-2 mb-4 border rounded" required>
            <select id="type" class="w-full p-2 mb-4 border rounded">
                <option value="pdf">PDF</option>
                <option value="video">Video</option>
                <option value="image">Image</option>
                <option value="text">Text</option>
            </select>
            <select id="audience" class="w-full p-2 mb-4 border rounded">
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
                <option value="all">All</option>
            </select>
            <button type="submit" class="w-full p-2 bg-blue-600 text-white rounded">Upload</button>
        </form>
        <div id="posts-list" class="bg-white p-8 rounded shadow-md">
            <h2 class="text-xl font-bold mb-4">Posts</h2>
        </div>
    </main>
    <script>
        const { createClient } = window.supabase;
        const supabase = createClient('https://jqguibaxagunlpyicnmo.supabase.co', 'sb_publishable_jjNYHSvSj_jDluW4PP5IUQ_1tgtFLBk');
        
        // Check auth
        supabase.auth.getUser().then(({ data: { user } }) => {
            if (!user) window.location.href = 'login.html';
            document.getElementById('user-email').textContent = user.email;
        });
        
        document.getElementById('logout').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });
        
        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const file = document.getElementById('file').files[0];
            const type = document.getElementById('type').value;
            const audience = document.getElementById('audience').value;
            
            // Upload file
            const { data: fileData, error: fileError } = await supabase.storage.from('files').upload(Date.now() + '_' + file.name, file);
            if (fileError) {
                alert(fileError.message);
                return;
            }
            
            const fileUrl = 'https://jqguibaxagunlpyicnmo.supabase.co/storage/v1/object/public/files/' + fileData.path;
            
            // Insert post
            const { error: postError } = await supabase.from('posts').insert({
                title,
                type,
                file_url: fileUrl,
                audience
            });
            
            if (postError) {
                alert(postError.message);
                return;
            }
            
            alert('Upload successful!');
            location.reload();
        });
        
        // View posts
        async function loadPosts() {
            const { data: posts, error } = await supabase.from('posts').select('*');
            if (error) {
                alert(error.message);
                return;
            }
            
            const list = document.getElementById('posts-list');
            if (posts.length === 0) {
                list.innerHTML += '<p>No content available</p>';
                return;
            }
            
            posts.forEach(post => {
                list.innerHTML += \`
                    <div class="flex justify-between items-center p-4 border-b">
                        <span>\${post.title} (\${post.type})</span>
                        <button onclick="deletePost('\${post.id}')" class="px-2 py-1 bg-red-600 text-white rounded">Delete</button>
                    </div>
                \`;
            });
        }
        
        async function deletePost(id) {
            await supabase.from('posts').delete().eq('id', id);
            location.reload();
        }
        
        loadPosts();
    </script>
</body>
</html>
