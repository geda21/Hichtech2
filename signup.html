<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | Hi Tech Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
    <script src="./js/supabase.js"></script>
    <script src="./js/auth.js"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden p-8 lg:p-12">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Join the Academy</h1>
            <p class="text-slate-500">Start your journey into the future of tech</p>
        </div>

        <form id="signupForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Create Password</label>
                <input type="password" id="password" placeholder="Min. 6 characters" required 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition shadow-lg shadow-slate-200">
                Create Account
            </button>
        </form>

        <div class="mt-8 text-center text-sm">
            <p class="text-slate-600">Already a member? 
                <a href="login.html" class="text-blue-600 font-bold hover:underline">Log In</a>
            </p>
        </div>
    </div>
</body>
</html>
